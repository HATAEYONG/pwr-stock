services:
  # ── Django Web (Gunicorn) ──────────────────────────────────
  - type: web
    name: powerstock-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_ENGINE
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: powerstock-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: powerstock-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: powerstock-redis
          type: redis
          property: connectionString
    healthCheckPath: /api/market/symbols/?limit=1

  # ── Celery Worker ─────────────────────────────────────────
  - type: worker
    name: powerstock-celery-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker --loglevel=info --concurrency=2
    envVars:
      - key: DJANGO_SECRET_KEY
        fromService:
          name: powerstock-api
          type: web
          envVarKey: DJANGO_SECRET_KEY
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: powerstock-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: powerstock-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: powerstock-redis
          type: redis
          property: connectionString

  # ── Celery Beat (스케줄러) ────────────────────────────────
  - type: worker
    name: powerstock-celery-beat
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DJANGO_SECRET_KEY
        fromService:
          name: powerstock-api
          type: web
          envVarKey: DJANGO_SECRET_KEY
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: powerstock-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: powerstock-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: powerstock-redis
          type: redis
          property: connectionString

  # ── Redis ─────────────────────────────────────────────────
  - type: redis
    name: powerstock-redis
    plan: free
    ipAllowList: []

databases:
  - name: powerstock-db
    databaseName: powerstock
    user: powerstock
    plan: free
